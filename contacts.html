<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>7TH | Contacts</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#111;
    --accent:#c9a96e;
    --bg:#f1f1f1;
    --text:#111;
}

body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:var(--bg);
    color:var(--text);
}

/* HEADER */
.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#fff;
    border-bottom:1px solid #ddd;
}
.logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:32px;
    letter-spacing:3px;
}
.menu a{
    margin-left:20px;
    text-decoration:none;
    color:#111;
    font-weight:600;
}

/* HERO */
.contacts-hero{
    height:300px;
    background:url('https://i.postimg.cc/sf6sqjKC/photo-2026-03-24-14-21-58.jpg') center/cover;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
}
.contacts-hero h1{
    font-family:'Bebas Neue',sans-serif;
    font-size:80px;
    letter-spacing:4px;
}

/* CONTENT */
.contacts{
    padding:60px 40px;
    display:flex;
    justify-content:center;
    gap:40px;
    flex-wrap:wrap;
}

.contact-card{
    background:#fff;
    border-radius:20px;
    padding:40px;
    width:300px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,0.08);
    transition:0.4s;
}
.contact-card:hover{
    transform:translateY(-10px);
}

.contact-card img{
    width:50px;
    margin-bottom:20px;
}

.contact-card h3{
    margin:10px 0;
    font-size:20px;
}

.contact-card p{
    font-size:14px;
    opacity:0.7;
}

.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:var(--accent);
    color:#111;
    border-radius:50px;
    text-decoration:none;
    font-weight:700;
    transition:0.3s;
}
.btn:hover{
    background:#111;
    color:#fff;
}

/* FOOTER */
.footer{
    background:#111;
    color:#fff;
    text-align:center;
    padding:40px;
    margin-top:40px;
}
</style>
</head>

<body>

<div class="header">
    <div class="logo">7TH</div>
    <div class="menu">
        <a href="{{ url_for('index') }}">Головна</a>
        <a href="{{ url_for('catalog') }}">Каталог</a>
    </div>
</div>

<div class="contacts-hero">
    <h1>CONTACTS</h1>
</div>

<div class="contacts">

    <!-- INSTAGRAM -->
    <div class="contact-card">
        <img src="https://img.icons8.com/ios-filled/50/000000/instagram-new.png"/>
        <h3>Instagram</h3>
        <p>Пиши нам в direct — відповідаємо швидко</p>
        <a href="https://instagram.com/yourpage" target="_blank" class="btn">Перейти</a>
    </div>

    <!-- SUPPORT CHAT -->
    <div class="contact-card">
        <img src="https://img.icons8.com/ios-filled/50/000000/chat.png"/>
        <h3>Support Chat</h3>
        <p>Онлайн допомога по замовленнях</p>
        <a href="https://t.me/lookbaby1" target="_blank" class="btn">Написати</a>
    </div>

    <!-- EMAIL -->
    <div class="contact-card">
        <img src="https://img.icons8.com/ios-filled/50/000000/new-post.png"/>
        <h3>Email</h3>
        <p>Для співпраці та питань</p>
        <a href="whatqwerty112@gmail.com" class="btn">Написати</a>
    </div>

</div>

<div class="footer">
    © 2026 7TH. All rights reserved.
</div>

</body>
</html>
