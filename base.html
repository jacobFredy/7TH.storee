<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>{{ category_name }}</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>
/* --- Змінні кольорів --- */
:root {
    --primary-color: #111; /* акцентний помаранчевий */
    --text-color: #111;
    --bg-color: #fff;
    --hover-color: #eee;
}

/* --- Базові стилі --- */
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: var(--bg-color);
    color: var(--text-color);
}
a {
    color: inherit;
    text-decoration: none;
}
ul {
    padding: 0;
    margin: 0;
    list-style: none;
}

/* --- Header --- */
header {
    background: var(--bg-color);
    padding: 20px 40px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
}
header .menu {
    display: flex;
    gap: 20px;
}
header .menu li a {
    font-weight: 600;
    transition: color 0.3s;
}
header .menu li a:hover {
    color: var(--primary-color);
}

/* --- Breadcrumb --- */
.breadcrumb{
    padding: 20px 40px;
    font-size: 14px;
}
.breadcrumb li{
    display:inline;
    margin-right:5px;
}
.breadcrumb li+li:before {
    content: ">";
    margin: 0 5px;
    color: #999;
}
.breadcrumb li a{
    text-decoration:none;
    color:#111;
    transition: color 0.3s;
}
.breadcrumb li a:hover{
    color: var(--primary-color);
}

/* --- Grid продуктів --- */
.products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
    padding: 20px 40px;
}

/* --- Продукт-карти --- */
.product-card {
    overflow: hidden;
    border-radius: 10px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    transition: transform 0.3s, box-shadow 0.3s;
    background: #fff;
}
.product-card:hover {
    transform: translateY(-5px);
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
}
.product-card img {
    width: 100%;
    transition: transform 0.5s;
}
.product-card:hover img {
    transform: scale(1.1);
}

/* --- Кнопки --- */
.button {
    padding: 10px 20px;
    background: var(--primary-color);
    color: #fff;
    border: none;
    border-radius: 5px;
    cursor: pointer;
    transition: background 0.3s;
    font-weight: 600;
}
.button:hover {
    background: darkorange;
}

/* --- Footer --- */
footer {
    text-align: center;
    padding: 20px 40px;
    background: #f5f5f5;
    margin-top: 40px;
    font-size: 14px;
    color: #555;
}

/* --- Адаптивність --- */
@media (max-width: 768px) {
    header, .breadcrumb, .products-grid, footer {
        padding: 15px 20px;
    }
    header .menu {
        flex-direction: column;
        gap: 10px;
    }
}
</style>
</head>
<body>

<header>
    <nav>
        <ul class="menu">
            <li><a href="/">Головна</a></li>
            <li><a href="/shop">Магазин</a></li>
            <li><a href="/contact">Контакти</a></li>
        </ul>
    </nav>
</header>

<ul class="breadcrumb">
    <li><a href="/">Головна</a></li>
    <li><a href="/shop">Магазин</a></li>
    <li>{{ category_name }}</li>
</ul>

{% block content %}{% endblock %}

<footer>
    <p>&copy; 2026 My Shop</p>
</footer>

</body>
</html>
